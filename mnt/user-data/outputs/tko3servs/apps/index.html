<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps — tko3servs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        sage: {
          50:'#eef9fe', 100:'#d8f1fc', 200:'#b6e5f8', 300:'#7fd0f1',
          400:'#42AEEA', 500:'#239bd8', 600:'#1279b4', 700:'#0f6598',
          800:'#0d4f77', 900:'#082f49'
        }
      },
      fontFamily: {
        serif:['"DM Serif Display"','Georgia','serif'],
        sans:['"DM Sans"','system-ui','sans-serif'],
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-sage-50 text-sage-900 font-sans font-light">

<!-- Header -->
<header class="sticky top-0 z-50 bg-sage-50/90 backdrop-blur border-b border-sage-100">
  <nav class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
    <a href="../" class="font-serif text-xl text-sage-800">tko3<span class="text-sage-400">servs</span></a>
    <ul class="flex items-center gap-6 text-sm list-none">
      <li><a href="./" class="text-sage-800 font-medium border-b-2 border-sage-400 pb-0.5">Apps</a></li>
      <li><a href="../api/" class="text-sage-500 hover:text-sage-700 transition-colors">API</a></li>
      <li><a href="../en/" class="border border-sage-200 rounded px-3 py-0.5 text-sage-500 hover:bg-sage-100 transition-colors">EN</a></li>
    </ul>
  </nav>
</header>

<main class="max-w-3xl mx-auto px-6 py-16 space-y-16">

  <div>
    <h1 class="font-serif text-4xl font-normal text-sage-900 mb-2">Apps</h1>
    <p class="text-sage-500">日常の調べ物に使える小さなツール集。</p>
  </div>

  <!-- 郵便番号変換 -->
  <section id="postcode" class="scroll-mt-20">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-9 h-9 bg-sage-100 rounded-lg flex items-center justify-center text-sage-600 font-serif">〒</div>
      <h2 class="font-serif text-2xl font-normal text-sage-800">郵便番号 → 住所変換</h2>
    </div>
    <div class="bg-white border border-sage-100 rounded-lg p-6 shadow-sm shadow-sage-100">
      <div class="flex gap-3 mb-5">
        <input
          id="pc-input"
          type="text"
          placeholder="例: 1600022 または 160-0022"
          maxlength="8"
          autocomplete="off"
          class="flex-1 border border-sage-200 rounded-lg px-4 py-2.5 text-sm text-sage-800 placeholder-sage-300 focus:outline-none focus:border-sage-400 focus:ring-1 focus:ring-sage-300 transition"
        >
        <button
          onclick="lookupPostcode()"
          class="bg-sage-600 text-white text-sm px-5 py-2.5 rounded-lg hover:bg-sage-800 transition-colors"
        >変換</button>
      </div>
      <div id="pc-result"></div>
    </div>
  </section>

  <!-- 西暦和暦変換 -->
  <section id="wareki" class="scroll-mt-20">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-9 h-9 bg-sage-100 rounded-lg flex items-center justify-center text-sage-600 font-serif">和</div>
      <h2 class="font-serif text-2xl font-normal text-sage-800">生年月日 → 和暦・星座・運勢</h2>
    </div>
    <div class="bg-white border border-sage-100 rounded-lg p-6 shadow-sm shadow-sage-100">
      <div class="flex gap-3 mb-5 flex-wrap">
        <input
          id="bday-input"
          type="date"
          value="1990-04-01"
          class="flex-1 min-w-0 border border-sage-200 rounded-lg px-4 py-2.5 text-sm text-sage-800 focus:outline-none focus:border-sage-400 focus:ring-1 focus:ring-sage-300 transition"
        >
        <button
          onclick="lookupBirthday()"
          class="bg-sage-600 text-white text-sm px-5 py-2.5 rounded-lg hover:bg-sage-800 transition-colors"
        >調べる</button>
      </div>
      <div id="bday-result"></div>
    </div>
  </section>

</main>

<!-- Footer -->
<footer class="bg-white border-t border-sage-100 py-8 mt-16">
  <div class="max-w-5xl mx-auto px-6 flex items-center justify-between flex-wrap gap-3">
    <span class="font-serif text-sage-400">tko3servs</span>
    <p class="text-xs text-gray-400">© 2025 tko3servs · <a href="mailto:info@tko3servs.com" class="text-sage-400 hover:underline">info@tko3servs.com</a></p>
  </div>
</footer>

<script>
/* ── 郵便番号変換 ── */
async function lookupPostcode() {
  const raw = document.getElementById('pc-input').value.replace(/-/g,'').trim();
  const el  = document.getElementById('pc-result');
  if (!raw) {
    el.innerHTML = `<p class="text-xs text-red-400">郵便番号を入力してください。</p>`;
    return;
  }
  el.innerHTML = `<p class="text-xs text-sage-400 animate-pulse">検索中...</p>`;
  try {
    const res  = await fetch(`https://api.tko3servs.com/postcode?q=${encodeURIComponent(raw)}`);
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      el.innerHTML = `<p class="text-xs text-red-400">該当する住所が見つかりませんでした。</p>`;
      return;
    }
    el.innerHTML = data.results.map(r => {
      const addr = `${r.pref}${r.city}${r.town}`;
      return `
        <div class="flex items-start justify-between gap-4 py-3 border-t border-sage-100 first:border-0">
          <div>
            <p class="text-xs text-sage-400 mb-0.5">〒${r.postcode.slice(0,3)}-${r.postcode.slice(3)}</p>
            <p class="text-sm font-medium text-sage-800">${addr}</p>
            <p class="text-xs text-sage-400 mt-0.5">${r.pref_kana}${r.city_kana}${r.town_kana}</p>
          </div>
          <button onclick="navigator.clipboard.writeText('${addr}')"
            class="text-xs text-sage-400 border border-sage-200 rounded px-2.5 py-1 hover:bg-sage-50 hover:text-sage-600 transition-colors whitespace-nowrap">
            コピー
          </button>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<p class="text-xs text-red-400">APIエラーが発生しました。</p>`;
  }
}

document.getElementById('pc-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupPostcode();
});

/* ── 和暦・星座・運勢 ── */
const ERAS = [
  { name:'令和', kana:'れいわ', en:'Reiwa', start: new Date('2019-05-01') },
  { name:'平成', kana:'へいせい', en:'Heisei', start: new Date('1989-01-08') },
  { name:'昭和', kana:'しょうわ', en:'Showa',  start: new Date('1926-12-25') },
  { name:'大正', kana:'たいしょう', en:'Taisho', start: new Date('1912-07-30') },
  { name:'明治', kana:'めいじ', en:'Meiji',  start: new Date('1868-01-25') },
];

const SIGNS = [
  { name:'山羊座', en:'Capricorn', emoji:'♑', end:[1,19] },
  { name:'水瓶座', en:'Aquarius',  emoji:'♒', end:[2,18] },
  { name:'魚座',   en:'Pisces',    emoji:'♓', end:[3,20] },
  { name:'牡羊座', en:'Aries',     emoji:'♈', end:[4,19] },
  { name:'牡牛座', en:'Taurus',    emoji:'♉', end:[5,20] },
  { name:'双子座', en:'Gemini',    emoji:'♊', end:[6,21] },
  { name:'蟹座',   en:'Cancer',    emoji:'♋', end:[7,22] },
  { name:'獅子座', en:'Leo',       emoji:'♌', end:[8,22] },
  { name:'乙女座', en:'Virgo',     emoji:'♍', end:[9,22] },
  { name:'天秤座', en:'Libra',     emoji:'♎', end:[10,23] },
  { name:'蠍座',   en:'Scorpio',   emoji:'♏', end:[11,22] },
  { name:'射手座', en:'Sagittarius',emoji:'♐', end:[12,21] },
  { name:'山羊座', en:'Capricorn', emoji:'♑', end:[12,31] },
];

const FORTUNES = [
  { label:'大吉', color:'text-amber-600 bg-amber-50 border-amber-200', msg:'今日は何をしても上手くいく日。積極的に動きましょう。' },
  { label:'吉',   color:'text-sage-600 bg-sage-50 border-sage-200',    msg:'穏やかで安定した一日。継続していることに良い兆しあり。' },
  { label:'中吉', color:'text-sage-500 bg-sage-50 border-sage-200',    msg:'まずまずの運気。小さな親切が後で大きく返ってきます。' },
  { label:'小吉', color:'text-sage-400 bg-sage-50 border-sage-100',    msg:'地道に積み上げる日。焦らず丁寧に取り組みましょう。' },
  { label:'末吉', color:'text-gray-500 bg-gray-50 border-gray-200',    msg:'今日は準備の日。明日への布石を打つ時間に充てて。' },
  { label:'凶',   color:'text-red-400 bg-red-50 border-red-200',       msg:'慎重に行動を。無理な挑戦は避け、休養も大切に。' },
];

function getSign(month, day) {
  return SIGNS.find(s => month < s.end[0] || (month === s.end[0] && day <= s.end[1])) || SIGNS[0];
}

function getDailyFortune(dateStr) {
  const today = new Date().toISOString().slice(0,10);
  const seed  = [...(dateStr + today)].reduce((a,c) => a + c.charCodeAt(0), 0);
  return FORTUNES[seed % FORTUNES.length];
}

function lookupBirthday() {
  const val = document.getElementById('bday-input').value;
  const el  = document.getElementById('bday-result');
  if (!val) { el.innerHTML = `<p class="text-xs text-red-400">日付を選択してください。</p>`; return; }

  const d     = new Date(val);
  const y     = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  const era   = ERAS.find(e => d >= e.start);
  const eraY  = era ? y - era.start.getFullYear() + 1 : '?';
  const sign  = getSign(m, day);
  const fort  = getDailyFortune(val);
  const age   = new Date().getFullYear() - y;

  el.innerHTML = `
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-2">
      <div class="bg-sage-50 rounded-lg p-3 border border-sage-100">
        <p class="text-xs text-sage-400 mb-1">和暦</p>
        <p class="text-base font-medium text-sage-800">${era ? era.name : '?'}${eraY}年</p>
        <p class="text-xs text-sage-400">${era ? era.kana : ''} ${eraY}nen</p>
      </div>
      <div class="bg-sage-50 rounded-lg p-3 border border-sage-100">
        <p class="text-xs text-sage-400 mb-1">年齢</p>
        <p class="text-base font-medium text-sage-800">${age} 歳</p>
        <p class="text-xs text-sage-400">${y}年生まれ</p>
      </div>
      <div class="bg-sage-50 rounded-lg p-3 border border-sage-100">
        <p class="text-xs text-sage-400 mb-1">星座</p>
        <p class="text-base font-medium text-sage-800">${sign.emoji} ${sign.name}</p>
        <p class="text-xs text-sage-400">${sign.en}</p>
      </div>
      <div class="rounded-lg p-3 border ${fort.color}">
        <p class="text-xs mb-1 opacity-70">今日の運勢</p>
        <p class="text-base font-medium">${fort.label}</p>
        <p class="text-xs mt-0.5 opacity-80 leading-relaxed">${fort.msg}</p>
      </div>
    </div>`;
}

// 初回ロード
window.addEventListener('DOMContentLoaded', () => {
  if (window.location.hash === '#wareki') lookupBirthday();
});
</script>
</body>
</html>
