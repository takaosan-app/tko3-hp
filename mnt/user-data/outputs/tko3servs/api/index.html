<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API — tko3servs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        sage: {
          50:'#eef9fe', 100:'#d8f1fc', 200:'#b6e5f8', 300:'#7fd0f1',
          400:'#42AEEA', 500:'#239bd8', 600:'#1279b4', 700:'#0f6598',
          800:'#0d4f77', 900:'#082f49'
        }
      },
      fontFamily: {
        serif:['"DM Serif Display"','Georgia','serif'],
        sans:['"DM Sans"','system-ui','sans-serif'],
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-sage-50 text-sage-900 font-sans font-light">

<header class="sticky top-0 z-50 bg-sage-50/90 backdrop-blur border-b border-sage-100">
  <nav class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
    <a href="../" class="font-serif text-xl text-sage-800">tko3<span class="text-sage-400">servs</span></a>
    <ul class="flex items-center gap-6 text-sm list-none">
      <li><a href="../apps/" class="text-sage-500 hover:text-sage-700 transition-colors">Apps</a></li>
      <li><a href="./" class="text-sage-800 font-medium border-b-2 border-sage-400 pb-0.5">API</a></li>
      <li><a href="../en/" class="border border-sage-200 rounded px-3 py-0.5 text-sage-500 hover:bg-sage-100 transition-colors">EN</a></li>
    </ul>
  </nav>
</header>

<main class="max-w-5xl mx-auto px-6 py-16">
  <div class="mb-12">
    <p class="text-xs font-medium tracking-widest uppercase text-sage-400 mb-3">ドキュメント</p>
    <h1 class="font-serif text-4xl font-normal text-sage-900 mb-3">API 一覧</h1>
    <p class="text-sage-500">すべてのAPIは認証不要・無料でお試しいただけます。</p>
  </div>

  <div class="space-y-4">
    <a href="postcode.html" class="flex items-start gap-5 bg-white border border-sage-100 rounded-lg p-6 hover:border-sage-400 hover:-translate-y-0.5 transition-all group">
      <div class="w-11 h-11 bg-sage-100 rounded-lg flex items-center justify-center text-sage-600 font-serif text-xl shrink-0">〒</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-3 mb-1">
          <h2 class="text-base font-medium text-sage-800">郵便番号 API</h2>
          <span class="text-xs bg-sky-50 text-sky-600 border border-sky-200 rounded-full px-2.5 py-0.5">稼働中</span>
        </div>
        <p class="text-sm text-sage-500 mb-2">郵便番号から都道府県・市区町村・町名（カナ付き）を返します。</p>
        <code class="text-xs font-mono text-sage-400">GET https://api.tko3servs.com/postcode?q={郵便番号}</code>
      </div>
      <span class="text-sage-300 group-hover:text-sage-500 transition-colors text-lg shrink-0">→</span>
    </a>

    <div class="flex items-start gap-5 bg-sage-50/50 border border-dashed border-sage-200 rounded-lg p-6 opacity-60">
      <div class="w-11 h-11 bg-sage-100 rounded-lg flex items-center justify-center text-sage-400 text-xl shrink-0">＋</div>
      <div>
        <div class="flex items-center gap-3 mb-1">
          <h2 class="text-base font-medium text-sage-600">住所 → 緯度経度 API</h2>
          <span class="text-xs bg-gray-100 text-gray-400 rounded-full px-2.5 py-0.5">準備中</span>
        </div>
        <p class="text-sm text-sage-400">住所文字列をジオコーディングして座標を返します。</p>
      </div>
    </div>
  </div>
</main>

<footer class="bg-white border-t border-sage-100 py-8 mt-16">
  <div class="max-w-5xl mx-auto px-6 flex items-center justify-between flex-wrap gap-3">
    <span class="font-serif text-sage-400">tko3servs</span>
    <p class="text-xs text-gray-400">© 2025 tko3servs · <a href="mailto:info@tko3servs.com" class="text-sage-400 hover:underline">info@tko3servs.com</a></p>
  </div>
</footer>

</html>
